server:
  port: 8080
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    # url: "jdbc:h2:mem:store"
    url: "jdbc:h2:mem:testdb"
    driverClassName: org.h2.Driver
    username: sa
    # password: password
    password:
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    generate-ddl: false
    hibernate:
      ddl-auto:
    show-sql: true
  sql:
    init:
      data-locations: classpath:manufacturer.sql, classpath:client.sql, classpath:employee.sql, classpath:appliance.sql
  messages:
    basename: messages/messages
logging:
  level:
    "[com.epam.rd.autotasks.springemployeecatalog]": "debug"
    root: "warn"
    "[org.springframework.web]": TRACE
    "[org.springframework.jdbc]": DEBUG
  pattern:
    console: "%d [%-5level] %c{5} %method: line:%line - %msg%n"

