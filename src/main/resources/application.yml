spring:
  profiles:
    active: h2
  thymeleaf:
    mode: HTML
    cache: false
  main:
    allow-bean-definition-overriding: true
  messages:
    basename: messages/messages
logging:
  level:
    "[com.epam.rd.autotasks.springemployeecatalog]": DEBUG
    root: "warn"
    "[org.springframework.web]": TRACE
    # "[org.springframework.jdbc]": DEBUG
  pattern:
    console: "%d [%-5level] %c{5} %method: line:%line - %msg%n"
