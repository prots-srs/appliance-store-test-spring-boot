<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
  <div th:fragment="cardline">
    <a th:href="@{/card}"
       class="text-light"
       th:text="#{cardline.card}"
       th:if="${card.number > 0}"></a>
    <span th:text="#{cardline.card}"
          th:if="${card.number == 0}"></span>
    : [[${card.number}]] [[#{cardline.items}]] [[${card.amount}]]
  </div>
</body>

</html>
