<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<!-- https://www.bootdey.com/snippets/view/shopping-cart-with-selected-products-order-summary-and-checkout-button#css -->

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet"
        th:href="@{/css/main.css}" />
  <link rel="stylesheet"
        th:href="@{/css/card.css}" />
  <link rel="stylesheet"
        th:href="@{/fonts/boxicons.css}" />
  <script th:src="@{/js/requests.js}"></script>
  <meta name="csrf-header"
        th:content="${_csrf.headerName}" />
  <meta name="csrf-token"
        th:content="${_csrf.token}" />

  <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/5.3.45/css/materialdesignicons.css"
        integrity="sha256-NAxhqDvtY0l4xn+YVa6WjAcmd94NNfttjNsDmNatFVc="
        crossorigin="anonymous" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
        rel='stylesheet'>

  <title th:text="#{mainpage.title}"></title>

</head>

<body>
  <header>
    <div th:insert="~{web/components/menunavy::line}"></div>
  </header>

  <div class="container mt-3">
    <div id="warning"
         class="alert alert-danger"
         th:classappend="${warning != null and warning != ''} ? '' : 'd-none'"
         role="note"></div>

  </div>
  <div class="container">
    <div class="row">
      <div class="col-xl-8">
        <div class="card border shadow-none"
             th:each="appliance: ${card.appliances}">
          <div class="card-body">

            <div class="d-flex align-items-start border-bottom pb-3">
              <div class="flex-grow-1 align-self-center overflow-hidden">
                <div>
                  <h5 class="text-truncate font-size-18"><a href="#"
                       class="text-dark">[[${appliance.name}]] </a></h5>

                  <p class="mb-0 mt-1">[[#{card.model}]] : <span class="fw-medium">[[${appliance.model}]]</span></p>
                </div>
              </div>
              <div class="flex-shrink-0 ms-2">
                <ul class="list-inline mb-0 font-size-16">
                  <li class="list-inline-item">
                    <div class="text-muted px-1"
                         style="cursor:pointer;"
                         th:onclick="'sendPostRequest(\'' + @{/api/v1/cart/remove/{id}(id=${appliance.id})} + '\')'">

                      <i class="mdi mdi-trash-can-outline"></i>
                    </div>
                  </li>
                </ul>
              </div>
            </div>

            <div>
              <div class="row">
                <div class="col-md-4">
                  <div class="mt-3">
                    <p class="text-muted mb-2">[[#{card.price}]]</p>
                    <h5 class="mb-0 mt-2">[[${appliance.price}]]</h5>
                  </div>
                </div>
                <div class="col-md-5">
                  <div class="mt-3">
                    <p class="text-muted mb-2">[[#{card.quantity}]]</p>
                    <div class="d-inline-flex">
                      <input type="number"
                             class="form-input w-xl"
                             name="quantity"
                             th:value="${appliance.quantity}"
                             th:onchange="'sendPostRequest(\'' + @{/api/v1/cart/quantity/{id}(id=${appliance.id})} + '/\' + this.value)'">
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="mt-3">
                    <p class="text-muted mb-2">[[#{card.total}]]</p>
                    <h5 th:text="${appliance.amount}"></h5>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
        <!-- end card -->

        <div class="row my-4">
          <div class="col-sm-6">
            <a th:href="@{/}"
               class="btn btn-link text-muted">
              <i class="mdi mdi-arrow-left me-1"></i> [[#{card.continue}]] </a>
          </div> <!-- end col -->
          <div class="col-sm-6">
            <div class="text-sm-end mt-2 mt-sm-0">
              <button class="btn btn-success"
                      th:onclick="'sendPostRequest(\'' + @{/api/v1/cart/checkout} + '\')'">

                <i class="mdi mdi-cart-outline me-1"></i> [[#{card.checkout}]] </button>
            </div>
          </div> <!-- end col -->
        </div> <!-- end row-->
      </div>

      <div class="col-xl-4">
        <div class="mt-5 mt-lg-0">
          <div class="card border shadow-none">
            <div class="card-header bg-transparent border-bottom py-3 px-4">
              <h5 class="font-size-16 mb-0"> [[#{card.summary}]] <span class="float-end"></span></h5>
            </div>
            <div class="card-body p-4 pt-2">

              <div class="table-responsive">
                <table class="table mb-0">
                  <tbody>
                    <tr class="bg-light">
                      <th th:text="#{card.total}"> :</th>
                      <td class="text-end">
                        <span class="fw-bold"
                              th:text="${card.total}"></span>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <!-- end table-responsive -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end row -->

  </div>

  <div th:insert="~{footer::footer}"></div>
</body>

</html>
