<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<!-- https://www.bootdey.com/snippets/view/shopping-cart-with-selected-products-order-summary-and-checkout-button#css -->

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet"
        th:href="@{/css/main.css}" />
  <link rel="stylesheet"
        th:href="@{/css/card.css}" />
  <link rel="stylesheet"
        th:href="@{/fonts/boxicons.css}" />
  <script th:src="@{/js/requests.js}"></script>
  <meta name="csrf-header"
        th:content="${_csrf.headerName}" />
  <meta name="csrf-token"
        th:content="${_csrf.token}" />

  <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/5.3.45/css/materialdesignicons.css"
        integrity="sha256-NAxhqDvtY0l4xn+YVa6WjAcmd94NNfttjNsDmNatFVc="
        crossorigin="anonymous" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
        rel='stylesheet'>

  <title th:text="#{mainpage.title}"></title>

</head>

<body>
  <header>
    <div th:insert="~{web/components/menunavy::line}"></div>
  </header>

  <div class="container mt-3">
    <div id="warning"
         class="alert alert-success"
         th:classappend="${orderId != null and orderId != ''} ? '' : 'd-none'"
         role="note">

      <div th:text="#{order.created(${orderId})}"></div>
    </div>

  </div>

  <div th:insert="~{footer::footer}"></div>
</body>

</html>
