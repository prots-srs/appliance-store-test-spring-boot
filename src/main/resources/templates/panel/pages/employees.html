<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta http-equiv="Content-Type"
        content="text/html; charset=UTF-8" />
  <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


  <link rel="stylesheet"
        th:href="@{/css/main.css}" />
  <link rel="stylesheet"
        th:href="@{/fonts/boxicons.css}" />
  <script th:src="@{/js/requests.js}"></script>
  <meta name="csrf-header"
        th:content="${_csrf.headerName}" />
  <meta name="csrf-token"
        th:content="${_csrf.token}" />

  <title th:text="#{employees.header.list}" />
</head>

<body>
  <div th:insert="~{panel/components/menunavy::navy}"></div>

  <div class="container">
    <div class="row">
      <div class="col">

        <h1 th:text="#{employees.header.list}" />

        <div id="warning"
             class="alert alert-danger"
             th:classappend="${warning != null and warning != ''} ? '' : 'd-none'"
             role="note"></div>

        <table class="table table-hover">
          <thead>
            <tr class="table-light">
              <th><a
                   th:href="@{{link}(sort='id', link=${currentPage}, page=${data.pagination.currentPage}, size=${data.pagination.pageSize})}">[[#{header.id}]]</a>
              </th>
              <th><a
                   th:href="@{{link}(sort='name', link=${currentPage}, page=${data.pagination.currentPage}, size=${data.pagination.pageSize})}">[[#{header.name}]]</a>
              </th>
              <th><a
                   th:href="@{{link}(sort='email', link=${currentPage}, page=${data.pagination.currentPage}, size=${data.pagination.pageSize})}">[[#{header.email}]]</a>
              </th>
              <th><a
                   th:href="@{{link}(sort='department', link=${currentPage}, page=${data.pagination.currentPage}, size=${data.pagination.pageSize})}">[[#{header.department}]]</a>
              </th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="employee: ${data.list}">
              <td>
                <a th:href="@{/panel/employees/{id}/edit(id=${employee.id})}"
                   th:text="${employee.id}" />
              </td>
              <td th:text="${employee.name}" />
              <td th:text="${employee.email}" />
              <td th:text="${employee.department}" />
              <td>
                <button type="button"
                        class="btn btn-outline-danger btn-sm"
                        th:onclick="'sendDeleteRequest(\'' + @{/panel/employees/{id}(id=${employee.id})} + '\')'">
                  [[#{btn.delete}]]
                </button>
              </td>
            </tr>

          </tbody>
        </table>
        <div th:if="${data.pagination.totalPages > 1}"
             class="m-4">
          <div th:replace="~{panel/components/pagination::pagination}">
          </div>
        </div>
        <a th:href="@{/panel/employees/create}"
           class="btn btn-primary"
           th:text="#{btn.new}"></a>

      </div>
    </div>
  </div>
  <div th:insert="~{footer::footer}"></div>

</body>

</html>
