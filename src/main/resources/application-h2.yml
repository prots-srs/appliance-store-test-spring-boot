spring:
  datasource:
    # url: "jdbc:h2:mem:store"
    url: "jdbc:h2:mem:testdb"
    driverClassName: org.h2.Driver
    username: sa
    # password: password
    password:
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    generate-ddl: false
    hibernate:
      ddl-auto: create
# spring.jpa.hibernate.ddl-auto=update
    show-sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:manufacturer.sql, classpath:client.sql, classpath:employee.sql, classpath:appliance.sql
